<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Pra-OSNK Informatika SMA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/dist/solid.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider">Simulasi Mandiri</span>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Pra-OSNK Informatika SMA</h1>
            <p class="text-slate-600 mt-1">Materi: Peluang, Berpikir Komputasional, & Kombinatorika</p>
            <p id="active-student-badge" class="hidden text-sm font-semibold text-emerald-600 mt-3 inline-block bg-emerald-50 border border-emerald-200 px-4 py-1 rounded-full">
                Peserta: <span id="display-student-name"></span>
            </p>
        </header>

        <div id="auth-card" class="bg-white border border-slate-200 shadow-sm rounded-xl p-6 max-w-md mx-auto mb-8 text-center">
            <h2 class="text-lg font-bold text-slate-900 mb-2">Registrasi Peserta Simulasi</h2>
            <p class="text-xs text-slate-500 mb-4">Silakan masukkan nama lengkap Anda untuk memulai perekaman skor.</p>
            <div class="text-left mb-4">
                <label for="input-name" class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap Siswa</label>
                <input type="text" id="input-name" placeholder="Contoh: Andi Wijaya" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <button onclick="mulaiSimulasi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors cursor-pointer">
                Mulai Simulasi
            </button>
        </div>

        <div id="score-board" class="hidden bg-white border border-emerald-100 shadow-sm rounded-xl p-6 mb-8 text-center animate-fade-in">
            <h2 class="text-xl font-bold text-slate-900">Hasil Akhir Simulasi</h2>
            <p class="text-slate-500 text-sm mt-1" id="score-owner-name"></p>
            <p class="text-5xl font-black text-emerald-600 my-4" id="final-score">0/6</p>
            <p class="text-slate-600 mb-4 px-4 max-w-2xl mx-auto leading-relaxed" id="score-commentary"></p>
            <button onclick="resetSimulasi()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-lg transition-colors cursor-pointer">
                Coba Ulang Simulasi
            </button>
        </div>

        <div class="space-y-6 hidden" id="quiz-container">
            <div class="bg-white border border-slate-200 shadow-xs rounded-xl p-6 transition-all" id="q1-card">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-blue-600">SOAL 1</span>
                    <span class="bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded font-medium">Kombinatorika (Pigeonhole)</span>
                </div>
                <p class="text-slate-800 font-medium leading-relaxed mb-4">
                    Dalam
